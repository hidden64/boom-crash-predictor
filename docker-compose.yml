version: "3.8"

services:
  backend:
    image: python:3.10-slim
    container_name: boom-crash-backend
    working_dir: /app
    volumes:
      - .:/app
    command: bash -c "pip install -r backend/requirements.txt && cd backend && uvicorn main:app --host 0.0.0.0 --port 8000 --reload"
    ports:
      - "8000:8000"
    environment:
      - PYTHONUNBUFFERED=1

  frontend:
    image: node:18-alpine
    container_name: boom-crash-frontend
    working_dir: /app/frontend
    volumes:
      - ./frontend:/app/frontend
      - /app/frontend/node_modules
    command: sh -c "npm install && npm run dev"
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development
